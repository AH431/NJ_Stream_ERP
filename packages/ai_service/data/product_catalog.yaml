- sku: PMIC-LDO-AMS1117-33
  category: power
  aliases:
    - AMS1117
    - AMS1117-3.3
    - LDO 3.3V
    - LDO regulator
    - 3.3V regulator
  description: >
    Advanced Monolithic Systems AMS1117-3.3 low-dropout linear voltage regulator.
    Fixed 3.3V output, 800 mA maximum output current, SOT-223 package.
    Standard choice for powering 3.3V MCUs and sensors from a 5V USB or unregulated supply.
  common_specs:
    output_voltage: 3.3V fixed
    input_voltage_max: 15V
    output_current: 800 mA max
    dropout_voltage: 1.3V typical
    package: SOT-223
    quiescent_current: 5 mA typical
  typical_use:
    - 3.3V regulated rail from 5V USB
    - MCU and sensor power supply
    - Breadboard and prototype power
    - Low-current regulated supply nodes
  suppliers:
    - Advanced Monolithic Systems (OEM)
    - Compatible equivalents (HT7333, XC6206-3.3, etc.)
  substitutes:
    - PMIC-BUCK-LM2596S (higher efficiency for large Vin-Vout gaps or >500 mA loads)
  notes: >
    At Vin=5V, Vout=3.3V, 800 mA → power dissipation is 1.36W (requires heatsink pad on PCB).
    For Vin > 7V or loads > 300 mA, switch to LM2596S buck converter for efficiency.
  qa:
    - q: What voltage does AMS1117-3.3 output?
      a: Fixed 3.3V regulated output, suitable for powering STM32, ESP32, nRF52840, and most 3.3V sensors.
    - q: Can AMS1117 power an ESP32?
      a: Yes, at light loads. ESP32 WiFi peak current is ~240 mA, which is within the 800 mA rating — but use adequate input decoupling capacitors.
    - q: When should I use LM2596 instead of AMS1117?
      a: Use LM2596S when input voltage exceeds 7V or load current exceeds 300 mA consistently, to avoid thermal issues.

- sku: PMIC-BUCK-LM2596S
  category: power
  aliases:
    - LM2596
    - LM2596S
    - buck converter
    - DC-DC step-down converter
    - switching regulator
  description: >
    Texas Instruments LM2596S adjustable buck (step-down) switching voltage regulator.
    3A output current, 150 kHz switching frequency, TO-263-5 (D2PAK) package.
    Significantly more efficient than LDO regulators when input-output voltage gap is large.
  common_specs:
    input_voltage: 4.5–40V
    output_voltage: "1.23–37V adjustable (fixed versions: 3.3V / 5V / 12V)"
    output_current: 3A max
    switching_frequency: 150 kHz
    efficiency: up to 92%
    package: TO-263-5 (D2PAK)
  typical_use:
    - 12V to 5V / 3.3V power conversion
    - Battery charger input regulation
    - Industrial panel power supply rails
    - High-current MCU power nodes
  suppliers:
    - Texas Instruments (OEM)
    - Compatible equivalents (MC34063 for lower current)
  substitutes:
    - PMIC-LDO-AMS1117-33 (simpler, no external components, but less efficient)
  notes: >
    Requires external inductor (33–68 µH), output capacitors, and catch diode (Schottky 3A).
    Refer to LM2596 datasheet application circuit for correct BOM and layout.
    Inductor must be rated ≥ 3A; use ferrite bead only for noise suppression, not the main inductor.
  qa:
    - q: What is the difference between LM2596 and AMS1117?
      a: LM2596S is a switching (buck) regulator with up to 92% efficiency, suitable for high currents and wide input voltage range. AMS1117 is a linear LDO — simpler but wastes energy as heat.
    - q: How efficient is LM2596S?
      a: Up to 92% efficiency, compared to ~66% for a 5V→3.3V LDO at similar loads.
    - q: What external components does LM2596 need?
      a: An inductor (33–68 µH, 3A rated), output filter capacitor (100–220 µF), feedback resistors, and a Schottky catch diode.

