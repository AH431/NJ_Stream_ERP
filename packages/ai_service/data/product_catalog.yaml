- sku: MCU-STM32F103C8
  category: microcontroller
  aliases:
    - STM32
    - STM32F103
    - STM32F103C8T6
    - Blue Pill MCU
    - STM32 Cortex-M3
  description: >
    STMicroelectronics 32-bit ARM Cortex-M3 microcontroller running at 72 MHz with 64 KB Flash
    and 20 KB RAM. Rich peripheral set including UART, SPI, I2C, USB, and CAN.
    One of the most popular MCUs for embedded IoT firmware and industrial control.
  common_specs:
    core: ARM Cortex-M3 @ 72 MHz
    flash: 64 KB
    ram: 20 KB
    gpio: 37 pins
    interfaces: UART, SPI, I2C, USB, CAN
    package: LQFP48
    supply_voltage: 2.0–3.6V
  typical_use:
    - Industrial sensor nodes
    - Motor control boards
    - Custom IoT firmware development
    - Wired embedded data loggers
    - Rapid prototyping
  suppliers:
    - STMicroelectronics (OEM)
    - Various Blue Pill module manufacturers
  substitutes:
    - MCU-ESP32-WROOM32U (if WiFi or Bluetooth required)
    - COMM-NRF52840-MOD (if BLE-only required)
  notes: >
    "Blue Pill" form factor widely available. Strong Arduino and STM32CubeIDE ecosystem.
    No built-in wireless — use ESP32 or nRF52840 for connected designs.
  qa:
    - q: What is MCU-STM32F103C8?
      a: A 32-bit ARM Cortex-M3 microcontroller by STMicroelectronics running at 72 MHz with 64 KB Flash and 20 KB RAM, featuring UART, SPI, I2C, USB, and CAN peripherals.
    - q: What is the STM32F103C8 used for?
      a: Embedded firmware development, industrial sensor nodes, motor control boards, and wired IoT prototyping where wireless connectivity is not required.
    - q: What is the difference between STM32 and ESP32?
      a: STM32F103C8 has no built-in wireless and is suited for cost-sensitive wired applications. ESP32 adds dual-core 240 MHz CPU, WiFi, and Bluetooth but costs more. Choose STM32 for wired control; ESP32 for connected IoT.

- sku: MCU-ESP32-WROOM32U
  category: microcontroller
  aliases:
    - ESP32
    - ESP32-WROOM
    - WROOM32U
    - ESP32 WiFi module
    - Espressif ESP32
  description: >
    Espressif dual-core 240 MHz MCU module with integrated 2.4 GHz WiFi 802.11 b/g/n and
    Bluetooth 4.2/BLE. The -32U variant uses a U.FL connector for an external antenna,
    providing better range. 4 MB Flash onboard. Ideal for connected IoT endpoints and gateways.
  common_specs:
    core: Xtensa LX6 dual-core @ 240 MHz
    flash: 4 MB (onboard)
    ram: 520 KB SRAM
    wifi: 802.11 b/g/n 2.4 GHz
    bluetooth: BT 4.2 + BLE
    gpio: 34 usable pins
    package: SMD module (18 x 20 mm)
    supply_voltage: 3.0–3.6V (3.3V typical)
  typical_use:
    - WiFi-connected sensor nodes
    - BLE beacons and proximity sensors
    - Smart home device firmware
    - OTA-updateable IoT endpoints
    - MQTT / HTTP gateway nodes
  suppliers:
    - Espressif Systems (OEM)
    - Authorized module distributors
  substitutes:
    - MCU-STM32F103C8 (if wireless not needed, lower cost)
    - COMM-NRF52840-MOD (if BLE-only and ultra-low power required)
  notes: >
    Requires 3.3V with careful power filtering (100 nF + 10 µF bypass caps near VCC).
    Use -32U variant when external antenna needed for improved range.
    High current draw during WiFi transmission (~240 mA peak) — size supply accordingly.
  qa:
    - q: Does MCU-ESP32-WROOM32U support WiFi?
      a: Yes, it supports 802.11 b/g/n 2.4 GHz WiFi and Bluetooth 4.2/BLE built-in.
    - q: What is the difference between ESP32-WROOM32 and ESP32-WROOM32U?
      a: The 32U has a U.FL external antenna connector for better range; the standard 32 uses a built-in PCB antenna.
    - q: Can ESP32 run on battery?
      a: Yes, but WiFi transmit peaks at ~240 mA. Use deep sleep (5–10 µA) and duty cycle carefully. Pair with BATT-LIPO-3V7-1800 and a 3.3V LDO.

