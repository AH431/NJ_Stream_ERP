    Multilayer ceramic capacitor (MLCC), 0402 package, 100 nF (0.1 µF) capacitance,
    10V rated voltage, X7R dielectric, ±10% tolerance. Primary use is IC power supply
    bypass/decoupling. Supplied on a reel of 4,000 units.
  common_specs:
    package: 0402 (1.0 x 0.5 mm)
    capacitance: 100 nF (0.1 µF)
    voltage_rating: 10V
    dielectric: X7R
    tolerance: ±10%
    reel_quantity: 4,000 units
  typical_use:
    - MCU and IC VCC pin bypass decoupling
