  common_asks:
    - q: What are Nexus PCB Assembly's payment terms?
      a: Net 30 days.
    - q: What does Nexus PCB Assembly typically order?
      a: Passive component reels, USB-C connectors, SMD LEDs, and power management ICs for client PCB assembly BOMs.

