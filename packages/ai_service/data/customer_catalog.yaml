- name: PinPoint Electronics Corp.
  segment: >
    Electronics contract manufacturer (EMS) providing PCB assembly, prototyping, and
    small-volume production runs for third-party clients. High passive component volume.
    Buys reels of SMD passives, connectors, and discrete components.
  preferred_products:
    - PASS-RES-0402-1K5K (bulk SMD resistors — high volume)
    - PASS-CAP-0402-100N4K (bulk SMD capacitors — high volume)
    - CONN-HDR-254-40P (prototype board connectors)
    - CONN-JST-PH2-2P (JST harness assemblies)
    - PCB-FR4-2L-100X100 (prototype PCB substrates)
    - PMIC-LDO-AMS1117-33 (common LDO regs for client designs)
  account_notes: >
    Net-30 payment terms. Typically orders in large quantities (full reels of passives).
    Procurement is spec-driven — will accept equivalent parts if original specified part is OOS.
    Tends to consolidate orders monthly. Key account for passive component volume.
  common_asks:
    - q: What are PinPoint Electronics' payment terms?
      a: Net 30 days.
    - q: What does PinPoint Electronics typically order?
      a: High-volume SMD passives (0402 resistors and caps by the reel), connectors, and PCB substrates for their EMS / assembly operations.

- name: Horizon Wearables Ltd.
  segment: >
    Wearable technology company designing health monitoring bands, smart watches,
    and fitness trackers. Prioritizes low-power BLE, compact sensors, and small battery systems.
  preferred_products:
    - COMM-NRF52840-MOD (BLE 5.0 for wearable radio)
    - SENS-MPU6050-6AX (motion and step-count sensing)
    - SENS-BME280-3IN1 (ambient environment sensing)
    - BATT-LIPO-3V7-1800 (wearable battery packs)
    - CONN-JST-PH2-2P (battery harness)
    - DISP-OLED-096-I2C (compact wearable displays)
  account_notes: >
    Net-60 payment terms. Very quality-sensitive — often requests lot traceability and
    certificates of conformance. Concerned about LiPo battery availability and stock levels.
    Frequently asks for substitutes when BLE modules are out of stock.
  common_asks:
    - q: What are Horizon Wearables' payment terms?
      a: Net 60 days.
    - q: What does Horizon Wearables typically buy?
      a: nRF52840 BLE modules, IMU sensors, LiPo batteries, JST connectors, and OLED displays for wearable device production.
    - q: Does Horizon Wearables care about stock levels?
      a: Yes — they are a key buyer of COMM-NRF52840-MOD and BATT-LIPO-3V7-1800, both of which are near safety stock. Notify them proactively if stock is constrained.

