# Customer Catalog — Static Metadata for Rich Knowledge Cards
# Contains: segment, preferred_products, account_notes, common_asks.
# Sensitive fields (email, tax_id) are NOT here — excluded at card-gen layer.
# Payment terms and contact name come from DB at card-gen time.

- name: TechNova Devices Inc.
  segment: >
    Consumer and industrial IoT device manufacturer. Designs and produces connected sensor
    nodes, gateways, and smart home endpoint hardware. Mid-size OEM with in-house PCB assembly.
  preferred_products:
    - MCU-ESP32-WROOM32U (WiFi-connected IoT nodes)
    - SENS-BME280-3IN1 (environmental sensor modules)
    - SENS-MPU6050-6AX (motion tracking devices)
    - DISP-OLED-096-I2C (status display modules)
    - CONN-USBC-16P-SMD (device USB charging ports)
    - PASS-CAP-0402-100N4K (bulk decoupling caps for PCB assembly)
  account_notes: >
    Established account with consistent repeat orders. Frequently orders ESP32 and sensor modules
    in quantities of 100–500 units. Often requests fast-track delivery on MCUs.
    Prefers net-30 payment and has maintained good payment history.
  common_asks:
    - q: What is TechNova's payment terms?
      a: Net 30 days.
    - q: What products does TechNova typically order?
      a: Primarily ESP32 WiFi modules, BME280 environmental sensors, OLED displays, and passive components for their PCB assembly runs.

