  preferred_products:
    - PASS-RES-0402-1K5K (bulk passives for assembly BOM)
    - PASS-CAP-0402-100N4K (bulk passives for assembly BOM)
    - CONN-USBC-16P-SMD (USB-C placement on client PCBs)
    - LED-WS2812B-5050R100 (addressable LED placements)
    - PMIC-BUCK-LM2596S (power management ICs for assembly)
    - PCB-FR4-2L-100X100 (bare boards for small prototype runs)
  account_notes: >
