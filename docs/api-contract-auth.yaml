# ==============================================================================
# NJ_Stream_ERP Auth API Contract — v1.0
# ==============================================================================
# 文件定位：Contract-First 開發單一真相來源 (SSOT) — 認證模組
# 凍結狀態：FROZEN — 2026-04-11 v1.0（W2 實作前已凍結）
# 關聯文件：docs/api-contract-sync-v1.6.yaml（Sync API 需要此模組提供的 JWT Token）
#
# 維護者規範：
#   - 任何對此文件的修改必須通知前後端雙方
#   - JWT Payload 欄位變更屬於 Breaking Change，需升版
#   - 禁止在未同步更新 api-contract-sync-v1.6.yaml 前修改 JWT Payload 結構
# ==============================================================================

openapi: "3.1.0"

info:
  title: NJ_Stream_ERP Auth API
  version: "1.0.0"
  description: |
    ## 概述（FROZEN v1.0 — 2026-04-11）
    NJ_Stream_ERP 認證 API。負責發行與刷新 JWT Token，供 Sync API 及其他端點使用。

    ## JWT Payload 結構
    ```json
    {
      "userId": 3,
      "role": "sales",
      "exp": 1744300800
    }
    ```

    ## 角色定義（對應 PRD v0.8 權限矩陣）
    | role | 說明 | 同步可操作 entityType |
    |------|------|----------------------|
    | `sales` | 業務員 | customer, quotation, sales_order |
    | `warehouse` | 倉管 | inventory_delta（in/out）|
    | `admin` | 管理員 | 全部 |

    ## Token 生命週期
    - Access Token 有效期：**1 小時**
    - Refresh Token 有效期：**30 天**
    - Access Token 過期後，前端以 Refresh Token 換取新 Token，無需重新登入
    - Refresh Token 過期後，強制重新登入

servers:
  - url: https://api.nj-stream-erp.example.com
    description: Production
  - url: https://staging-api.nj-stream-erp.example.com
    description: Staging
  - url: http://localhost:3000
    description: Local Development

tags:
  - name: Auth
    description: 認證端點（登入、Token 刷新、登出）

paths:
  /api/v1/auth/login:
    post:
      operationId: authLogin
      tags:
        - Auth
      summary: 使用者登入
      description: |
        以帳號密碼登入，取得 Access Token 與 Refresh Token。
        前端需將兩者安全儲存（Access Token 存於記憶體，Refresh Token 存於 Secure Storage）。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: "sales_user_01"
              password: "P@ssw0rd!"
      responses:
        '200':
          description: 登入成功，回傳 Token 組合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                refreshToken: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4..."
                expiresIn: 3600
                role: "sales"
                userId: 3
        '400':
          description: 請求格式錯誤（欄位缺失）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
              example:
                code: VALIDATION_ERROR
                message: "username 為必填欄位。"
        '401':
          description: 帳號或密碼錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
              example:
                code: INVALID_CREDENTIALS
                message: "帳號或密碼錯誤。"
        '403':
          description: 帳號已停用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
              example:
                code: ACCOUNT_DISABLED
                message: "此帳號已停用，請聯絡管理員。"

  /api/v1/auth/refresh:
    post:
      operationId: authRefresh
      tags:
        - Auth
      summary: 刷新 Access Token
      description: |
        使用有效的 Refresh Token 換取新的 Access Token。
        前端應在 Access Token 過期前（建議提前 5 分鐘）主動刷新，
        避免 Sync Push 請求因 Token 過期而失敗。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Refresh Token 無效或已過期，需重新登入
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
              example:
                code: REFRESH_TOKEN_EXPIRED
                message: "Refresh Token 已過期，請重新登入。"
        '403':
          description: 帳號已停用（Refresh Token 尚有效但帳號已被停用）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
              example:
                code: ACCOUNT_DISABLED
                message: "此帳號已停用，請聯絡管理員。"

  /api/v1/auth/logout:
    post:
      operationId: authLogout
      tags:
        - Auth
      summary: 登出（撤銷 Refresh Token）
      description: |
        撤銷伺服器端的 Refresh Token，使其無法再用於刷新。
        前端同時清除本地儲存的所有 Token。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: 登出成功（無回傳 body）
        '401':
          description: 未授權

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          maxLength: 100
          description: 使用者帳號（對應 users.username）
        password:
          type: string
          format: password
          minLength: 8
          description: 密碼（傳輸前請確保 HTTPS）

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: 登入時取得的 Refresh Token

    TokenResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - role
        - userId
      properties:
        accessToken:
          type: string
          description: JWT Access Token，有效期 1 小時（存於記憶體）
        refreshToken:
          type: string
          description: Refresh Token，有效期 30 天（存於 Secure Storage）
        expiresIn:
          type: integer
          description: Access Token 有效秒數（固定 3600）
          example: 3600
        role:
          type: string
          enum:
            - sales
            - warehouse
            - admin
          description: 使用者角色（與 JWT Payload 一致，供前端快速讀取）
        userId:
          type: integer
          description: 使用者 ID（對應 users.id）

    AuthErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - INVALID_CREDENTIALS
            - ACCOUNT_DISABLED
            - REFRESH_TOKEN_EXPIRED
            - UNAUTHORIZED
          description: 認證錯誤碼
        message:
          type: string
          description: 錯誤說明
