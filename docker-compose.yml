version: '3.9'

services:
  nj-erp-postgres:
    image: postgres:16-alpine
    container_name: nj-erp-postgres
    restart: always
    environment:
      POSTGRES_DB: nj_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123   # 開發階段建議，生產請改用 secrets 或 .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 可選：初始化腳本（若未來需要 seed 資料）
      # - ./packages/backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
