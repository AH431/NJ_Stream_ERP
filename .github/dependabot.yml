version: 2
updates:
  # Backend — npm (packages/backend)
  - package-ecosystem: "npm"
    directory: "/packages/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"

  # Frontend — pub (Flutter, packages/frontend)
  - package-ecosystem: "pub"
    directory: "/packages/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"
