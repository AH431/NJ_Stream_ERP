# 生產環境 Docker Compose
# 使用前：cp .env.production.example .env.production 並填入實際值
# 啟動：docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# 初次 migration：docker compose -f docker-compose.prod.yml --env-file .env.production run --rm migrate

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nj-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-nj_erp}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nj-erp-net
    # 生產環境不對外暴露 PostgreSQL port；僅 backend 透過內部網路連線
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nj_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Migration（一次性執行後自動退出）─────────────────────────────────────
  migrate:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
      target: builder
    entrypoint: ["node", "node_modules/.bin/drizzle-kit", "migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    networks:
      - nj-erp-net
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

  # ── AI Service (FastAPI / RAG) ────────────────────────────────────────────
  ai_service:
    build:
      context: ./packages/ai_service
      dockerfile: Dockerfile
    container_name: nj-erp-ai-service
    restart: unless-stopped
    environment:
      AI_SERVICE_INTERNAL_TOKEN: ${AI_SERVICE_INTERNAL_TOKEN:?AI_SERVICE_INTERNAL_TOKEN is required}
      AI_FAKE_LLM:               ${AI_FAKE_LLM:-false}
      FASTIFY_INTERNAL_URL:      ${FASTIFY_INTERNAL_URL:-http://backend:3000/api/v1}
      OLLAMA_BASE_URL:           ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_MODEL:              ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_NUM_CTX:            ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_TEMPERATURE:        ${OLLAMA_TEMPERATURE:-0.3}
      EMBEDDING_MODEL:           ${EMBEDDING_MODEL:-mxbai-embed-large}
      CHROMA_DB_PATH:            /data/chroma
      TOP_K:                     ${TOP_K:-3}
      CHUNK_SIZE:                ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP:             ${CHUNK_OVERLAP:-100}
      DB_READONLY_URL:           ${DB_READONLY_URL:?DB_READONLY_URL is required}
      # ── Phase 4B 需求預測 ──────────────────────────────────
      DATABASE_URL:              ${DATABASE_URL:?DATABASE_URL is required}
      FORECAST_WEEKS_AHEAD:      ${FORECAST_WEEKS_AHEAD:-12}
      FORECAST_MIN_DATA_WEEKS:   ${FORECAST_MIN_DATA_WEEKS:-8}
      FORECAST_JOB_LEASE_SECONDS: ${FORECAST_JOB_LEASE_SECONDS:-900}
      FORECAST_FAKE_PROPHET:     ${FORECAST_FAKE_PROPHET:-false}
      AI_INTERNAL_SCOPES:        ${AI_INTERNAL_SCOPES:-analytics.read,forecast.generate}
      # ── Structured log（requestId/jobId 跨服務 grep 必需）──
      LOG_FORMAT:                json
    volumes:
      - chroma_data:/data/chroma
    networks:
      - nj-erp-net
    # ai_service 不對外暴露 port；僅 backend 透過 Docker 內部網路呼叫
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/health',timeout=5); sys.exit(0 if b'ok' in r.read() else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: nj-erp-backend
    restart: unless-stopped
    environment:
      NODE_ENV:                production
      HOST:                    0.0.0.0
      PORT:                    ${PORT:-3000}
      DATABASE_URL:            ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET:              ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRES_IN:   ${JWT_ACCESS_EXPIRES_IN:-3600}
      JWT_REFRESH_EXPIRES_IN:  ${JWT_REFRESH_EXPIRES_IN:-2592000}
      COMPANY_NAME:            ${COMPANY_NAME:-NJ Stream}
      COMPANY_ADDRESS:         ${COMPANY_ADDRESS:-}
      COMPANY_PHONE:           ${COMPANY_PHONE:-}
      COMPANY_EMAIL:           ${COMPANY_EMAIL:-}
      COMPANY_TAX_ID:          ${COMPANY_TAX_ID:-}
      FIREBASE_SERVICE_ACCOUNT:  ${FIREBASE_SERVICE_ACCOUNT:-}
      AI_SERVICE_URL:            ${AI_SERVICE_URL:-http://ai_service:8000}
      AI_SERVICE_INTERNAL_TOKEN: ${AI_SERVICE_INTERNAL_TOKEN:?AI_SERVICE_INTERNAL_TOKEN is required}
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${PORT:-3000}:3000"
    networks:
      - nj-erp-net
    depends_on:
      postgres:
        condition: service_healthy
      ai_service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(d.includes('ok')?0:1))}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nj-erp-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local